<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Paw Paradise — Mémorial</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="wrap">
    <section class="card memorial" aria-label="Mémorial Paw Paradise">
      <a class="back" href="index.html">← Retour</a>

      <div class="hero">
        <img class="avatar" src="charlie.jpg" alt="Photo de Charlie" />
        <div>
          <h2>Charlie</h2>
          <div class="dates">2010 — 2025</div>
        </div>
      </div>

      <p class="tribute">
        Merci pour les promenades, la présence tranquille, et les petites joies simples.
      </p>

      <div class="actions">
        <button class="btn secondary" type="button" data-soon>Allumer une bougie</button>
      </div>

      <div class="divider"></div>

      <div class="small">
        <div class="label">Souvenir</div>
        <div class="quote">« Tu restes dans nos cœurs. »</div>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>

</html>
